<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#1E1B6E"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <linearGradient id="bgrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E0E7FF"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- Subtle shine overlay -->
  <rect width="1024" height="1024" rx="224" fill="url(#shine)"/>

  <!-- Decorative circle accents -->
  <circle cx="820" cy="200" r="180" fill="rgba(255,255,255,0.04)"/>
  <circle cx="200" cy="850" r="140" fill="rgba(255,255,255,0.03)"/>

  <!-- Subtle grid/POS dots pattern -->
  <g opacity="0.06">
    <circle cx="160" cy="160" r="4" fill="white"/>
    <circle cx="240" cy="160" r="4" fill="white"/>
    <circle cx="320" cy="160" r="4" fill="white"/>
    <circle cx="160" cy="240" r="4" fill="white"/>
    <circle cx="240" cy="240" r="4" fill="white"/>
    <circle cx="320" cy="240" r="4" fill="white"/>
  </g>

  <!-- Main "B" letter - bold, prominent -->
  <g filter="url(#shadow)">
    <text x="130" y="680"
      font-family="Arial Black, Arial, Helvetica, sans-serif"
      font-weight="900"
      font-size="620"
      fill="url(#bgrad)"
      letter-spacing="-15">B</text>
  </g>

  <!-- "pos" text - modern, integrated -->
  <g filter="url(#glow)">
    <text x="500" y="700"
      font-family="Arial, Helvetica, sans-serif"
      font-weight="700"
      font-size="210"
      fill="rgba(255,255,255,0.95)"
      letter-spacing="8">pos</text>
  </g>

  <!-- Accent dot on the "o" making it look like a target/POS terminal -->
  <circle cx="640" cy="610" r="18" fill="#818CF8" opacity="0.9"/>

  <!-- Small receipt/terminal icon accent bottom-right -->
  <g transform="translate(800, 800)" opacity="0.2">
    <rect x="0" y="0" width="60" height="80" rx="6" fill="white"/>
    <line x1="10" y1="18" x2="50" y2="18" stroke="#4F46E5" stroke-width="4"/>
    <line x1="10" y1="32" x2="40" y2="32" stroke="#4F46E5" stroke-width="3"/>
    <line x1="10" y1="44" x2="45" y2="44" stroke="#4F46E5" stroke-width="3"/>
    <line x1="10" y1="56" x2="35" y2="56" stroke="#4F46E5" stroke-width="3"/>
  </g>

  <!-- Bottom subtle line accent -->
  <rect x="180" y="760" width="300" height="4" rx="2" fill="rgba(129,140,248,0.4)"/>
</svg>